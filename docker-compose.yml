services:
  qdrant-quran:
    image: qdrant/qdrant:latest
    container_name: qdrant-quran
    ports:
      - "${QDRANT_PORT:-6335}:6333"
      - "${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
      - ./qdrant.yaml:/qdrant/config/production.yaml:z
    environment:
      - QDRANT_HOST=${QDRANT_HOST:-localhost}
    deploy:
      resources:
        limits:
          memory: 1.5G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - quran-rag-network

networks:
  quran-rag-network:
    driver: bridge
